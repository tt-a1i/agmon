run:
  timeout: 5m
  go: "1.24"

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - typecheck
    - unused
    - gosimple

linters-settings:
  misspell:
    locale: US
  staticcheck:
    checks: ["all", "-ST1000", "-ST1020", "-ST1021", "-ST1022"]

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: cmd/tokenmeter/main\.go
      linters:
        - errcheck
  max-issues-per-linter: 50
  max-same-issues: 10
